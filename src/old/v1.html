<!DOCTYPE html>

<html>
<head>


    <style>
        body {margin: 0; padding: 0; width: 100vw; height: 100vh;}
        #real-text-box {position: relative; width: 100%; height: 30%;}
    </style>

</head>

<body>
    <div>
        <input id = 'text-input' type = text placeholder = 'type or paste text here'>
        <button onclick = 'placeText()'>Katana-ify text</button>
    </div>

    <p id = 'real-text-box'>

    </p>
</body>

<script>
    // real vs. virt like the Bobiverse
    const real_box = document.getElementById('real-text-box');
    const virt_box = document.createElement('p');
    virt_box.style.position = 'relative';

    const input = document.getElementById('text-input');

    // For debugging purposes

    virt_box.style.border = '1px solid red';
    document.body.appendChild(virt_box);

    function makeSpan(text) {
        let span = document.createElement('span');
        span.textContent = text;
        return span
    }

    function placeText() {
        // TODO: separate these from the recalculate loop
        virt_box.textContent = input.value;
        input.value = '';

        virt_box.replaceChildren(...splitIntoSpans(virt_box));
        real_box.replaceChildren();
        // hopefully the DOM recalculates

        for (let element of virt_box.children) {
            // https://stackoverflow.com/questions/11634770/get-position-offset-of-element-relative-to-a-parent-container
            let offsetLeft = element.offsetLeft;
            let offsetTop = element.offsetTop;

            console.log(element);
            console.log(element.textContent);
            let newElement = makeSpan(element.textContent);
            newElement.style.position = 'absolute';
            newElement.style.left = `${offsetLeft}px`;
            newElement.style.top = `${offsetTop}px`;

            if (real_box.childElementCount == 0) {
                real_box.appendChild(newElement);
            } else {
                let beforeElem = real_box.children[Math.floor(Math.random() * real_box.childElementCount)];
                real_box.insertBefore(newElement, beforeElem);
            }
        }
    }

    function splitIntoSpans(text_element, min_size=3, max_size=11) {
        // https://stackoverflow.com/questions/9691582/javascript-how-to-break-up-a-string-every-x-amount-of-characters
        let spans = [];
        let text_content = text_element.textContent;
        while (text_content.length) {
            let len = Math.floor(Math.random() * (max_size - min_size)) + min_size;
            spans.push(text_content.substring(0, len));
            text_content = text_content.substring(len);
        }
        return spans.map(makeSpan);
    }

    function matchShapes() {
        let vw = `${real_box.clientWidth}px`;
        let vh = `${real_box.clientHeight}px`;

        if (vw != virt_box.style.width || vh != virt_box.style.height) {
            virt_box.style.width = vw;
            virt_box.style.height = vh;
            placeText();
        }
    }

    setInterval(matchShapes, .05);
</script>

</html>
